<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>💰 Controle de Gastos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #2c3e50; }
    input, button { margin: 5px; padding: 8px; }
    .resultado { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>💰 Controle de Gastos</h1>

  <h2>Adicionar gasto</h2>
  <input id="mes" placeholder="MM/YYYY">
  <input id="item" placeholder="Item">
  <input id="valor" type="number" placeholder="Valor">
  <input id="categoria" placeholder="Categoria">
  <button onclick="adicionarGasto()">Adicionar</button>

  <h2>Consultar total do mês</h2>
  <input id="mesConsulta" placeholder="MM/YYYY">
  <button onclick="consultarMes()">Consultar</button>

  <h2>Relatório anual</h2>
  <input id="anoConsulta" placeholder="YYYY">
  <button onclick="consultarAno()">Consultar</button>

  <div class="resultado" id="resultado"></div>

  <script>
    const API_URL = "http://127.0.0.1:8000";

    async function adicionarGasto() {
      const mes = document.getElementById("mes").value;
      const item = document.getElementById("item").value;
      const valor = document.getElementById("valor").value;
      const categoria = document.getElementById("categoria").value;

      const res = await fetch(`${API_URL}/gastos/?mes=${mes}&item=${item}&valor=${valor}&categoria=${categoria}`, {
        method: "POST"
      });
      const data = await res.json();
      document.getElementById("resultado").innerText = JSON.stringify(data, null, 2);
    }

    async function consultarMes() {
      const mes = document.getElementById("mesConsulta").value;
      const res = await fetch(`${API_URL}/gastos/?mes=${mes}`);
      const data = await res.json();

      if (data.detail) {
        document.getElementById("resultado").innerText = "❌ Nenhum gasto encontrado para este mês.";
      } else {
        document.getElementById("resultado").innerText =
          `📅 Mês consultado: ${data.mes}\n💰 Total de gastos: R$ ${data.total.toFixed(2)}`;
      }
    }


    async function consultarAno() {
      const ano = document.getElementById("anoConsulta").value;
      const res = await fetch(`${API_URL}/gastos/ano/${ano}`);
      const data = await res.json();

      if (data.detail) {
        document.getElementById("resultado").innerText = "❌ Nenhum gasto encontrado para esse ano";
      } else {
        let texto = `📊 Relatório de ${data.ano}\n\n`;
        for (const [mes, total] of Object.entries(data.totais_por_mes)) {
          texto += `📅 ${mes}: R$ ${total.toFixed(2)}\n`;
        }
        texto += `\n💰 Total anual: R$ ${data.total_anual.toFixed(2)}`;
        document.getElementById("resultado").innerText = texto;
      }
    }

  </script>
</body>
</html>
